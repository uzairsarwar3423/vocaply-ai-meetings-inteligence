version: '3.8'

services:
  bot-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.bot-service
    ports:
      - "8001:8001"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - BACKEND_URL=http://backend:8000/api/v1
    depends_on:
      - redis
    networks:
      - vocaply-network
  # Note: Actual bot instances would be spawned dynamically by bot-service
  # using the Docker API or Kubernetes. This compose file defines the infra.

networks:
  vocaply-network:
    external: true

volumes:
  redis_data:
    external: true
